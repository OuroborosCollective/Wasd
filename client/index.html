<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Arelorian Client</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; }
      #loading-screen {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        background: linear-gradient(135deg, #0a0e27 0%, #1a1a3a 100%);
        z-index: 9999;
      }
      #loading-screen.hidden { display: none; }
      .loading-content { text-align: center; }
      .loading-title { font-size: 2.5rem; margin-bottom: 2rem; color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
      .loading-spinner {
        width: 60px; height: 60px; margin: 0 auto 2rem;
        border: 4px solid rgba(255,215,0,0.2);
        border-top: 4px solid #ffd700;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .loading-status { font-size: 1rem; color: #aaa; margin-bottom: 1rem; min-height: 1.5rem; }
      .loading-progress {
        width: 300px; height: 4px; background: rgba(255,215,0,0.1); border-radius: 2px; overflow: hidden;
      }
      .loading-progress-bar {
        height: 100%; background: linear-gradient(90deg, #ffd700, #ffed4e);
        width: 0%; animation: progress 2s ease-in-out infinite;
      }
      @keyframes progress { 0% { width: 0%; } 50% { width: 100%; } 100% { width: 100%; } }
      .loading-error { color: #ff6b6b; font-size: 0.9rem; margin-top: 1rem; max-width: 400px; }
    </style>
      <link rel="stylesheet" href="/src/styles/theme.css" />
  </head>
  <body>
    <div id="loading-screen">
      <div class="loading-content">
        <div class="loading-title">ARELORIA</div>
        <div class="loading-spinner"></div>
        <div class="loading-status" id="loading-status">Initializing game...</div>
        <div class="loading-progress">
          <div class="loading-progress-bar"></div>
        </div>
        <div class="loading-error" id="loading-error"></div>
      </div>
    </div>
    <script>
      // Global loading state
      window.loadingScreen = {
        setStatus: (msg) => {
          const el = document.getElementById('loading-status');
          if (el) el.textContent = msg;
        },
        setError: (msg) => {
          const el = document.getElementById('loading-error');
          if (el) el.textContent = msg;
        },
        hide: () => {
          const el = document.getElementById('loading-screen');
          if (el) el.classList.add('hidden');
        }
      };
      
      // Timeout after 30 seconds
      setTimeout(() => {
        if (!document.getElementById('loading-screen').classList.contains('hidden')) {
          window.loadingScreen.setError('Loading timeout - check console for errors');
        }
      }, 30000);
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
