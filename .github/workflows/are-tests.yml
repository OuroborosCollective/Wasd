name: ARE Focused Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  are-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build client and server
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: pnpm run build

      - name: Run focused ARE tests
        run: npx vitest run server/src/tests/runtime-settings-store.test.ts client/src/engine/babylon/BabylonAdapter.test.ts
