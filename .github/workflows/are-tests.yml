name: ARE Focused Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  are-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build client and server
        run: npm run build

      - name: Run focused ARE tests
        run: npx vitest run server/src/tests/runtime-settings-store.test.ts client/src/engine/babylon/BabylonAdapter.test.ts
