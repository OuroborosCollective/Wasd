name: Continuous Deployment to VPS

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 * * * *' # Stündlich ausführen
  # Re-run from Actions tab if deploy failed (e.g. Vite OOM on the VPS).
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_IP }}
        username: ${{ secrets.VPS_USER }}
        password: ${{ secrets.VPS_SSH_PASSWORD }}
        port: 22
        script: |
          if [ ! -d "/opt/areloria/.git" ]; then
            git clone https://github.com/OuroborosCollective/Wasd.git /opt/areloria
          fi
          cd /opt/areloria
          git fetch origin main
          git reset --hard origin/main
          chmod +x deploy/deploy.sh
          ./deploy/deploy.sh
