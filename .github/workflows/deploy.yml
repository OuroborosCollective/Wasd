name: Continuous Deployment to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Manuelles Triggern

concurrency:
  group: deploy-vps-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@v1.0.3
      env:
        BUILD_NODE_OPTIONS: --max-old-space-size=8192
      with:
        host: ${{ secrets.VPS_IP }}
        username: ${{ secrets.VPS_USER }}
        password: ${{ secrets.VPS_SSH_PASSWORD }}
        port: 22
        # Default 30s is too tight when GitHub→VPS routing is slow (dial tcp …:22: i/o timeout).
        timeout: 120s
        # Client+Server build on VPS can exceed default 60s
        command_timeout: 45m
        script: |
          if [ ! -d "/opt/areloria/.git" ]; then
            git clone https://github.com/OuroborosCollective/Wasd.git /opt/areloria
          fi
          cd /opt/areloria
          git fetch origin main
          git reset --hard origin/main
          export BUILD_NODE_OPTIONS="--max-old-space-size=8192"
          chmod +x deploy/deploy.sh
          ./deploy/deploy.sh

    - name: Verify deployed HTTPS endpoints
      env:
        VERIFY_BASE_URL: ${{ secrets.DEPLOY_VERIFY_BASE_URL }}
      run: |
        set -e
        verify_url() {
          local url="$1"
          local name="$2"
          local attempts=10
          local wait_sec=6
          local code=""
          for i in $(seq 1 "$attempts"); do
            code="$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 25 "$url" || true)"
            if [ "$code" = "200" ]; then
              echo "✅ ${name} OK (${url})"
              return 0
            fi
            echo "⏳ ${name} not ready (${url}) [attempt ${i}/${attempts}] status=${code:-n/a}"
            sleep "$wait_sec"
          done
          echo "❌ ${name} failed after ${attempts} attempts (${url}), last status=${code:-n/a}"
          return 1
        }

        if [ -z "${VERIFY_BASE_URL:-}" ]; then
          echo "ℹ️  Secret DEPLOY_VERIFY_BASE_URL nicht gesetzt — überspringe externe HTTPS-Checks (Deploy auf VPS lief durch)."
          exit 0
        fi

        BASE="${VERIFY_BASE_URL%/}"
        verify_url "${BASE}/health" "HTTPS health endpoint"
        verify_url "${BASE}/" "HTTPS client root"
        verify_url "${BASE}/gm/" "HTTPS GM console"
