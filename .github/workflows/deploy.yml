name: Continuous Deployment to VPS

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 * * * *' # Stündlich ausführen
  workflow_dispatch: # Manuelles Triggern ermöglichen

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_IP }}
        username: ${{ secrets.VPS_USER }}
        password: ${{ secrets.VPS_SSH_PASSWORD }}
        port: 22
        script: |
          if [ ! -d "/opt/areloria/.git" ]; then
            git clone https://github.com/OuroborosCollective/Wasd.git /opt/areloria
          fi
          cd /opt/areloria
          git fetch origin main
          git reset --hard origin/main
          export BUILD_NODE_OPTIONS="--max-old-space-size=8192"
          chmod +x deploy/deploy.sh
          ./deploy/deploy.sh

    - name: Verify deployed HTTPS endpoints
      run: |
        set -e
        verify_url() {
          local url="$1"
          local name="$2"
          local attempts=10
          local wait_sec=6
          local code=""
          for i in $(seq 1 "$attempts"); do
            code="$(curl -s -o /dev/null -w "%{http_code}" "$url" || true)"
            if [ "$code" = "200" ]; then
              echo "✅ ${name} OK (${url})"
              return 0
            fi
            echo "⏳ ${name} not ready (${url}) [attempt ${i}/${attempts}] status=${code:-n/a}"
            sleep "$wait_sec"
          done
          echo "❌ ${name} failed after ${attempts} attempts (${url}), last status=${code:-n/a}"
          return 1
        }

        verify_url "https://arelogic.space/health" "HTTPS health endpoint"
        verify_url "https://arelogic.space/" "HTTPS client root"
        verify_url "https://arelogic.space/gm/" "HTTPS GM console"
