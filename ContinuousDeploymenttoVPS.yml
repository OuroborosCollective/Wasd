name: Continuous Deployment to VPS

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 * * * *' # Stündlich ausführen
  workflow_dispatch: # Manuelles Triggern ermöglichen

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_IP }}
        username: ${{ secrets.VPS_USER }}
        password: ${{ secrets.VPS_SSH_PASSWORD }}
        port: 22
        timeout: 120s
        command_timeout: 20m
        script: |
          set -e
          export CI=1
          if [ ! -d "/opt/areloria/.git" ]; then
            git clone https://github.com/OuroborosCollective/Wasd.git /opt/areloria
          fi
          cd /opt/areloria
          git fetch origin main
          git reset --hard origin/main
          chmod +x deploy/deploy.sh deploy/update.sh deploy/write_pm2_ecosystem.sh 2>/dev/null || true
          if [ ! -f /opt/areloria/server/dist/index.js ] || ! command -v pm2 >/dev/null 2>&1; then
            ./deploy/deploy.sh
          else
            ./deploy/update.sh
          fi
          if [ "${SKIP_DEPLOY_HEALTH_CHECK:-}" != "1" ]; then
            sleep 2
            curl -sf --max-time 15 http://127.0.0.1:3000/health | grep -q '"ok"' && echo "Deploy health check: OK" || { echo "Deploy health check: FAILED (is the server listening on 3000?)"; exit 1; }
          fi
